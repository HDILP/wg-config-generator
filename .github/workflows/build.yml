name: Build Windows EXE
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt nuitka
      - name: Compile with Nuitka
        run: >
          python -m nuitka --onefile --windows-console-mode=disable
          --enable-plugin=tk-inter --include-package=customtkinter
          --output-dir=dist --output-filename=WireGuardConfigGenerator
          main.py
      - uses: actions/upload-artifact@v4
        with:
          name: wg-config-generator-win
          path: dist/WireGuardConfigGenerator.exe
