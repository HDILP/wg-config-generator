name: Build Windows EXE
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
      - name: Install dependencies
        run: pip install -r requirements.txt nuitka
      - name: Compile with Nuitka
        run: >
          python -m nuitka --standalone --mingw64 --windows-console-mode=disable
          --enable-plugin=tk-inter --include-package=customtkinter
          --include-package-data=customtkinter
          --include-package=app,backup,core,models,pages,services,utils,widgets
          --include-data-dir=assets/installers=assets/installers
          --assume-yes-for-downloads
          --output-dir=dist --output-filename=GPServerManager
          main.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gp-server-manager-win
          path: dist/main.dist/
