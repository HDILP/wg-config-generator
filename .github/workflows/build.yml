name: Build Windows EXE
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: Install dependencies
        run: pip install -r requirements.txt nuitka
      - name: Compile with Nuitka
        run: >
          python -m nuitka --onefile --windows-console-mode=disable
          --enable-plugin=tk-inter --include-package=customtkinter
          --include-package-data=customtkinter
          --include-package=app,core,models,pages,services,utils,widgets
          --assume-yes-for-downloads
          --output-dir=dist --output-filename=GPServerManager
          main.py
      - uses: actions/upload-artifact@v4
        with:
          name: gp-server-manager-win
          path: dist/GPServerManager.exe
