name: Build Windows EXE
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: ${{ runner.os }}-nuitka-${{ hashFiles('requirements.txt') }}
      - name: Install dependencies
        run: pip install -r requirements.txt nuitka
      - name: Compile with Nuitka
        run: >
          python -m nuitka --standalone --mingw64 --jobs=8 --windows-console-mode=disable
          --enable-plugin=tk-inter --include-package=customtkinter
          --include-package-data=customtkinter
          --windows-icon-from-ico=icon.ico
          --include-package=app,backup,core,models,pages,services,utils,widgets
          --assume-yes-for-downloads
          --output-dir=dist --output-filename=GPServerManager
          main.py
      - name: Copy installers into dist
        shell: cmd
        run: |
          if not exist "dist\main.dist\assets\icons" mkdir "dist\main.dist\assets\icons"
          xcopy /Y /I /E "assets\icons\*" "dist\main.dist\assets\icons\"
          if not exist "dist\main.dist\assets\installers" mkdir "dist\main.dist\assets\installers"
          xcopy /Y /I /E "assets\installers\*" "dist\main.dist\assets\installers\"
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        run: iscc setup.iss
      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: gp-server-manager-portable
          path: dist/main.dist/
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: gp-server-manager-installer
          path: dist/installer/GPServerManager_Setup.exe
